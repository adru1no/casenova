<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>CaseNova</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
}

.logo{
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.cases{
padding:60px;
}

.case-container{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

.case{
background:#020617;
padding:25px;
border-radius:10px;
width:200px;
}

.case button{
padding:12px 25px;
border:none;
background:#38bdf8;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.roll-window{
width:720px;
margin:40px auto;
overflow:hidden;
border:3px solid #38bdf8;
border-radius:10px;
background:#020617;
}

.roll{
display:flex;
transition:transform 5s cubic-bezier(.17,.67,.35,1);
}

.item{
width:120px;
padding:10px;
}

.item img{
width:80px;
}

.consumer{border-bottom:4px solid gray;}
.milspec{border-bottom:4px solid blue;}
.restricted{border-bottom:4px solid purple;}
.classified{border-bottom:4px solid hotpink;}
.covert{border-bottom:4px solid red;}
.knife{border-bottom:4px solid gold;}

#inventory{
list-style:none;
padding:0;
}

#inventory li{
margin:5px;
}

</style>

</head>

<body>

<header>

<div class="logo">CaseNova</div>

<nav>
<a href="#">Home</a>
<a href="#cases">Cases</a>
<a href="#profile">Profile</a>
</nav>

</header>

<section id="cases" class="cases">

<h1>Open Cases</h1>

<div class="roll-window">
<div class="roll" id="roll"></div>
</div>

<div class="case-container">

<div class="case">

<h3>Starter Case</h3>
<p>$1</p>

<button onclick="openCase('starter')">
Open
</button>

</div>

<div class="case">

<h3>Gold Case</h3>
<p>$20</p>

<button onclick="openCase('gold')">
Open
</button>

</div>

</div>

</section>

<section id="profile">

<h2>Inventory</h2>

<ul id="inventory"></ul>

</section>

<script>

const starterCase=[

{name:"P2000",img:"images/p2000.png",rarity:"consumer"},
{name:"USP-S",img:"images/usp.png",rarity:"consumer"},
{name:"MP7",img:"images/mp7.png",rarity:"consumer"},
{name:"FAMAS",img:"images/famas.png",rarity:"consumer"},
{name:"Glock-18",img:"images/glock.png",rarity:"consumer"}

];

const goldCase=[

{name:"AK-47 Redline",img:"images/ak47.png",rarity:"classified"},
{name:"M4A4 Desolate Space",img:"images/m4a4.png",rarity:"classified"},
{name:"AWP Neo Noir",img:"images/awp.png",rarity:"covert"},
{name:"Desert Eagle",img:"images/deagle.png",rarity:"restricted"},
{name:"Knife",img:"images/knife.png",rarity:"knife"}

];

function openCase(type){

let caseItems;

if(type==="starter"){
caseItems=starterCase;
}else{
caseItems=goldCase;
}

const roll=document.getElementById("roll");

roll.innerHTML="";
roll.style.transform="translateX(0px)";

let rollItems=[];

for(let i=0;i<60;i++){

const item=caseItems[Math.floor(Math.random()*caseItems.length)];

rollItems.push(item);

}

rollItems.forEach(item=>{

const div=document.createElement("div");

div.className="item "+item.rarity;

div.innerHTML=`
<img src="${item.img}">
<p>${item.name}</p>
`;

roll.appendChild(div);

});

const winIndex=50;

const shift=-(winIndex*120);

setTimeout(()=>{

roll.style.transform=`translateX(${shift}px)`;

},100);

setTimeout(()=>{

const winItem=rollItems[winIndex];

const inventory=document.getElementById("inventory");

const li=document.createElement("li");

li.textContent=winItem.name;

inventory.appendChild(li);

alert("You won: "+winItem.name);

},5200);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CaseNova</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* Верхняя панель */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#38bdf8;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  font-size:16px;
}

nav a:hover{
  color:#38bdf8;
}

/* Главный экран */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:60px;
  margin-bottom:20px;
}

.hero p{
  font-size:20px;
  color:#94a3b8;
  margin-bottom:40px;
}

.open-btn{
  padding:15px 40px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  cursor:pointer;
  transition:0.3s;
}

.open-btn:hover{
  background:#0ea5e9;
  transform:scale(1.05);
}

/* Кейсы */
.cases{
  padding:60px 40px;
  text-align:center;
}

.case-container{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  margin-top:40px;
}

.case{
  background:#020617;
  padding:25px;
  border-radius:12px;
  width:180px;
  transition:0.3s;
  border:1px solid #1e293b;
}

.case:hover{
  transform:translateY(-5px);
  border-color:#38bdf8;
}

.case img{
  width:100%;
}

.case h3{
  margin:15px 0 10px;
}

.case button{
  padding:10px 20px;
  border:none;
  background:#38bdf8;
  border-radius:6px;
  cursor:pointer;
}

/* Барабан для анимации */
.case-roll {
  display: flex;
  justify-content: center;
  overflow: hidden;
  width: 400px;
  margin: 30px auto;
  border: 2px solid #38bdf8;
  border-radius: 12px;
  background: #020617;
  height: 100px;
  position: relative;
}

.case-items {
  display: flex;
  transition: transform 2s cubic-bezier(0.25, 1, 0.5, 1);
}

.case-item {
  min-width: 100px;
  text-align: center;
  padding: 10px;
  color: white;
  font-weight: bold;
}

footer{
  margin-top:80px;
  padding:30px;
  text-align:center;
  background:#020617;
  color:#64748b;
}
</style>
</head>

<body>

<header>
  <div class="logo">CaseNova</div>
  <nav>
    <a href="#">Home</a>
    <a href="#cases">Cases</a>
    <a href="#profile">Profile</a>
  </nav>
</header>

<section class="hero">
  <h1>Open Cases. Win Skins.</h1>
  <p>The ultimate case opening experience</p>
  <button class="open-btn">Open Starter Case</button>
</section>

<section id="cases" class="cases">
  <h2>Starter Case</h2>
  <div class="case-roll">
    <div class="case-items" id="caseItems">
      <!-- Скины будут вставляться JS -->
    </div>
  </div>
  <div class="case-container">
    <div class="case">
      <img src="https://i.imgur.com/7QKQF5Q.png" alt="Starter Case">
      <h3>Starter Case</h3>
      <p>$1</p>
      <button class="case-btn">Open</button>
    </div>
  </div>
</section>

<section id="profile" class="cases">
  <h2>Profile</h2>
  <p>Name: Player1</p>
  <p>Inventory:</p>
  <ul id="inventory">
    <!-- Выигранные скины будут здесь -->
  </ul>
</section>

<footer>
  © 2026 CaseNova
</footer>

<script>
// Скины стартового кейса
const starterSkins = [
  { name: "P2000 | Handgun", rarity: "Common", price: "$0.5" },
  { name: "USP-S | Pistol", rarity: "Common", price: "$0.7" },
  { name: "FAMAS | Assault Rifle", rarity: "Common", price: "$0.6" },
  { name: "MP7 | SMG", rarity: "Common", price: "$0.5" }
];

const caseItemsDiv = document.getElementById("caseItems");

// Заполняем барабан
starterSkins.forEach(item => {
  const div = document.createElement("div");
  div.classList.add("case-item");
  div.textContent = item.name;
  caseItemsDiv.appendChild(div);
});

// Функция открытия кейса с анимацией
function openCase() {
  const randomIndex = Math.floor(Math.random() * starterSkins.length);

  const shift = -randomIndex * 100; // ширина элемента 100px
  caseItemsDiv.style.transition = "transform 2s cubic-bezier(0.25, 1, 0.5, 1)";
  caseItemsDiv.style.transform = `translateX(${shift}px)`;

  setTimeout(() => {
    const item =arterSkins[randomIndex];
    const inventory = document.getElementById("inventory");
    const li = document.createElement("li");
    li.textContent = `${item.name} (${item.rarity}) — ${item.price}`;
    inventory.appendChild(li);

    alert(`You won: ${item.name} (${item.rarity}) — ${item.price}`);
  }, 2100);
}

// Подключаем кнопки
document.querySelector(".open-btn").addEventListener("click", openCase);
document.querySelector(".case-btn").addEventListener("click", openCase);
</script>

</body>
</html>

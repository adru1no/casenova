<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CaseNova</title>

<style>
/* Общие стили */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* Верхняя панель */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#38bdf8;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  font-size:16px;
}

nav a:hover{
  color:#38bdf8;
}

/* Главный экран */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:60px;
  margin-bottom:20px;
}

.hero p{
  font-size:20px;
  color:#94a3b8;
  margin-bottom:40px;
}

.open-btn{
  padding:15px 40px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  cursor:pointer;
  transition:0.3s;
}

.open-btn:hover{
  background:#0ea5e9;
  transform:scale(1.05);
}

/* Кейсы */
.cases{
  padding:60px 40px;
  text-align:center;
}

.case-container{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  margin-top:40px;
}

.case{
  background:#020617;
  padding:25px;
  border-radius:12px;
  width:180px;
  transition:0.3s;
  border:1px solid #1e293b;
}

.case:hover{
  transform:translateY(-5px);
  border-color:#38bdf8;
}

.case img{
  width:100%;
}

.case h3{
  margin:15px 0 10px;
}

.case button{
  padding:10px 20px;
  border:none;
  background:#38bdf8;
  border-radius:6px;
  cursor:pointer;
}

footer{
  margin-top:80px;
  padding:30px;
  text-align:center;
  background:#020617;
  color:#64748b;
}
</style>

</head>
<body>

<header>
  <div class="logo">CaseNova</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Cases</a>
    <a href="#">Upgrade</a>
    <a href="#">Inventory</a>
  </nav>
</header>

<section class="hero">
  <h1>Open Cases. Win Skins.</h1>
  <p>The ultimate case opening experience</p>
  <button class="open-btn">Open Case</button>
</section>

<section class="cases">
  <h2>Popular Cases</h2>
  <div class="case-container">
    <div class="case">
      <img src="https://i.imgur.com/7QKQF5Q.png" alt="Starter Case">
      <h3>Starter Case</h3>
      <p>$1</p>
      <button>Open</button>
    </div>
    <div class="case">
      <img src="https://i.imgur.com/7QKQF5Q.png" alt="Sniper Case">
      <h3>Sniper Case</h3>
      <p>$5</p>
      <button>Open</button>
    </div>
    <div class="case">
      <img src="https://i.imgur.com/7QKQF5Q.png" alt="Knife Case">
      <h3>Knife Case</h3>
      <p>$25</p>
      <button>Open</button>
    </div>
  </div>
</section>

<footer>
  © 2026 CaseNova
</footer>

</body>
</html>

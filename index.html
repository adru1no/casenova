<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CaseNova</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
}

.logo{
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.cases{
text-align:center;
padding:60px;
}

.case-container{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
}

.case{
background:#020617;
padding:20px;
border-radius:10px;
width:200px;
}

.case button{
margin-top:10px;
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
}

.roll-area{
margin-top:40px;
display:flex;
justify-content:center;
}

.roll-window{
width:700px;
overflow:hidden;
border:3px solid #38bdf8;
border-radius:10px;
background:#020617;
}

.roll{
display:flex;
transition:transform 5s cubic-bezier(.17,.67,.35,1);
}

.item{
width:140px;
padding:10px;
text-align:center;
}

.item img{
width:90px;
}

.consumer{border-bottom:4px solid gray;}
.milspec{border-bottom:4px solid blue;}
.restricted{border-bottom:4px solid purple;}
.classified{border-bottom:4px solid hotpink;}
.covert{border-bottom:4px solid red;}
.knife{border-bottom:4px solid gold;}

#inventory li{
margin:5px 0;
}

</style>
</head>

<body>

<header>

<div class="logo">CaseNova</div>

<nav>
<a href="#">Home</a>
<a href="#cases">Cases</a>
<a href="#profile">Profile</a>
</nav>

</header>

<section id="cases" class="cases">

<h1>Case Opening</h1>

<div class="roll-area">

<div class="roll-window">

<div class="roll" id="roll"></div>

</div>

</div>

<div class="case-container">

<div class="case">
<h3>Starter Case</h3>
<p>$1</p>
<button onclick="openCase(starterCase)">Open</button>
</div>

<div class="case">
<h3>Gold Case</h3>
<p>$20</p>
<button onclick="openCase(goldCase)">Open</button>
</div>

</div>

</section>

<section id="profile" class="cases">

<h2>Inventory</h2>

<ul id="inventory"></ul>

</section>

<script>

const starterCase=[

{name:"P2000",img:"images/p2000.png",rarity:"consumer"},
{name:"USP-S",img:"images/usp.png",rarity:"consumer"},
{name:"MP7",img:"images/mp7.png",rarity:"consumer"},
{name:"FAMAS",img:"images/famas.png",rarity:"consumer"},
{name:"Glock",img:"images/glock.png",rarity:"consumer"},
{name:"UMP45",img:"images/ump.png",rarity:"consumer"},
{name:"Nova",img:"images/nova.png",rarity:"consumer"},
{name:"MAC10",img:"images/mac10.png",rarity:"consumer"},
{name:"P250",img:"images/p250.png",rarity:"consumer"},
{name:"MP9",img:"images/mp9.png",rarity:"consumer"},
{name:"Galil",img:"images/galil.png",rarity:"consumer"},
{name:"SG553",img:"images/sg553.png",rarity:"consumer"},
{name:"MAG7",img:"images/mag7.png",rarity:"consumer"},
{name:"Negev",img:"images/negev.png",rarity:"consumer"},
{name:"XM1014",img:"images/xm1014.png",rarity:"consumer"},
{name:"MP5",img:"images/mp5.png",rarity:"consumer"},
{name:"CZ75",img:"images/cz75.png",rarity:"consumer"},
{name:"Tec9",img:"images/tec9.png",rarity:"consumer"}

];

const goldCase=[

{name:"AK47 Redline",img:"images/ak47.png",rarity:"classified"},
{name:"M4A4 Desolate Space",img:"images/m4a4.png",rarity:"classified"},
{name:"AWP Neo Noir",img:"images/awp.png",rarity:"covert"},
{name:"M4A1S Decimator",img:"images/m4a1s.png",rarity:"classified"},
{name:"AWP Fever Dream",img:"images/awp2.png",rarity:"classified"},
{name:"Desert Eagle",img:"images/deagle.png",rarity:"restricted"},
{name:"USP Cortex",img:"images/usp2.png",rarity:"restricted"},
{name:"Glock Water Elemental",img:"images/glock2.png",rarity:"restricted"},
{name:"AK Phantom",img:"images/ak2.png",rarity:"classified"},
{name:"M4 Neo Noir",img:"images/m4a42.png",rarity:"covert"},
{name:"SSG Dragonfire",img:"images/ssg.png",rarity:"classified"},
{name:"P90 Trigon",img:"images/p90.png",rarity:"restricted"},
{name:"AK Frontside",img:"images/ak4.png",rarity:"classified"},
{name:"AWP Hyper Beast",img:"images/awp3.png",rarity:"covert"},
{name:"Knife",img:"images/knife.png",rarity:"knife"}

];

function openCase(caseItems)
  t roll=document.getElementById("roll");

roll.innerHTML="";

let rollItems=[];

for(let i=0;i<60;i++){

const item=caseItems[Math.floor(Math.random()*caseItems.length)];

rollItems.push(item);

}

rollItems.forEach(item=>{

const div=document.createElement("div");

div.className="item "+item.rarity;

div.innerHTML=`
<img src="${item.img}">
<p>${item.name}</p>
`;

roll.appendChild(div);

});

const winIndex=50;

const shift=-(winIndex*140);

setTimeout(()=>{

roll.style.transform=`translateX(${shift}px)`

},100);

setTimeout(()=>{

const win=rollItems[winIndex];

const inventory=document.getElementById("inventory");

const li=document.createElement("li");

li.textContent=win.name;

inventory.appendChild(li);

alert("You won: "+win.name);

},5200);

}

</script>

</body>
</html>{
